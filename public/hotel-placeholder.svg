<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Hotel placeholder</title>
  <desc id="desc">A calm illustrated hotel placeholder used when a hotel image is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef4f8" />
      <stop offset="100%" stop-color="#f7f2ea" />
    </linearGradient>
    <linearGradient id="building" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5c7ea8" />
      <stop offset="100%" stop-color="#35536f" />
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dff1f0" />
      <stop offset="100%" stop-color="#b9d8d2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)" />
  <circle cx="1020" cy="120" r="72" fill="#dbe8ef" />
  <path d="M0 590 C170 520 310 530 470 590 S820 650 1200 560 V750 H0 Z" fill="#dbe8e0" />
  <path d="M90 620 C220 570 390 575 560 625 S940 675 1200 615 V750 H90 Z" fill="#cbded6" />
  <rect x="330" y="150" width="430" height="360" rx="28" fill="url(#building)" />
  <rect x="410" y="90" width="270" height="120" rx="24" fill="#496987" />
  <rect x="485" y="405" width="120" height="105" rx="18" fill="#20374c" />
  <rect x="395" y="235" width="95" height="72" rx="12" fill="url(#glass)" />
  <rect x="530" y="235" width="95" height="72" rx="12" fill="url(#glass)" />
  <rect x="395" y="330" width="95" height="72" rx="12" fill="url(#glass)" />
  <rect x="530" y="330" width="95" height="72" rx="12" fill="url(#glass)" />
  <rect x="665" y="235" width="95" height="72" rx="12" fill="url(#glass)" />
  <rect x="665" y="330" width="95" height="72" rx="12" fill="url(#glass)" />
  <text x="600" y="604" text-anchor="middle" fill="#35536f" font-family="Arial, sans-serif" font-size="38" font-weight="700">
    StaySense hotel image coming soon
  </text>
</svg>
